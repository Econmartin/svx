# Coolify deploys this stack as a single application.
# - Bot exposes port 4321 (read-only API). Coolify routes
#   `https://${SERVICE_FQDN_BOT_4321}` → bot:4321 automatically.
# - Dashboard exposes port 3030 and is the user-facing URL.
# - Persistent SQLite ledger + operator.json live in the `svx-data` volume.
#
# Required secrets (set in the Coolify env panel — DO NOT commit):
#   SUI_PRIVATE_KEY_BECH32   — operator's bech32-encoded ed25519 secret key
#   OPERATOR_JSON            — JSON string of {operatorAddress, managerId, ...}
#                              (only needed for live mode; paper mode ignores it)
#
# Strategy tunables (thresholds, position caps, daily limits, intervals)
# live in packages/svx-bot/src/tunables.ts. Edit them there and redeploy —
# they are NOT passed via env any more. Env only carries secrets, network
# choices, kill-switches, and instance identity.
#
# NOTE: `environment` uses MAP syntax (not list) because Coolify's env
# substitution can leave empty entries with list syntax for unset passthrough
# vars, which docker compose then rejects with "non-string key".

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    # Explicit shared tag: bot and bot-mainnet are byte-identical images
    # (same Dockerfile, context, args). Building them as two compose targets
    # exported + unpacked the SAME image twice in parallel, which doubled
    # the peak disk I/O of every deploy — enough to starve the host's sshd
    # and drop Coolify's SSH channel (exit 255, "failed" deploys whose
    # builds actually completed). bot builds once; bot-mainnet runs the tag.
    image: "svx-bot-${COOLIFY_RESOURCE_UUID:-local}:latest"
    restart: unless-stopped
    environment:
      # Coolify magic env: generates a public FQDN and routes :4321 to it.
      SERVICE_FQDN_BOT_4321: ""
      NODE_ENV: production
      SUI_NETWORK: testnet
      SUI_RPC_URL: "${SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}"
      PREDICT_SERVER_URL: "${PREDICT_SERVER_URL:-https://predict-server.testnet.mystenlabs.com}"
      # Execution kill-switches (kept in env so a Coolify panel toggle can
      # halt live trading without a code change).
      PAPER_TRADING: "${PAPER_TRADING:-true}"
      # Infra identity.
      SVX_LOG_LEVEL: "${SVX_LOG_LEVEL:-info}"
      SVX_INSTANCE_LABEL: "${SVX_INSTANCE_LABEL:-testnet}"
      # Secrets — set these in the Coolify env panel. Defaults to empty so
      # paper mode runs cleanly without them.
      SUI_PRIVATE_KEY_BECH32: "${SUI_PRIVATE_KEY_BECH32:-}"
      OPERATOR_JSON: "${OPERATOR_JSON:-}"
    volumes:
      - svx-data:/data
    expose:
      - "4321"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      # Generous so first-boot gets enough time on slow shared infra (Coolify).
      start_period: 90s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        # Bake the public bot URLs into the client bundle at build time.
        # In Coolify, set NEXT_PUBLIC_SVX_API to the bot's public FQDN
        # (with https://) once you've assigned the bot a domain. The mainnet
        # URL is optional — set it to bot-mainnet's FQDN to enable the
        # `/mainnet` (Polymarket) page; leave empty otherwise.
        NEXT_PUBLIC_SVX_API: "${NEXT_PUBLIC_SVX_API:-http://bot:4321}"
        NEXT_PUBLIC_SVX_API_MAINNET: "${NEXT_PUBLIC_SVX_API_MAINNET:-http://bot-mainnet:4321}"
    restart: unless-stopped
    environment:
      SERVICE_FQDN_DASHBOARD_3030: ""
      NODE_ENV: production
      NEXT_PUBLIC_SVX_API: "${NEXT_PUBLIC_SVX_API:-http://bot:4321}"
      NEXT_PUBLIC_SVX_API_MAINNET: "${NEXT_PUBLIC_SVX_API_MAINNET:-http://bot-mainnet:4321}"
    expose:
      - "3030"
    # Plain depends_on — start order only, NOT health gating. The dashboard
    # is a static-rendering Next.js app that simply 404s its API calls until
    # the bot is up. This keeps the stack from getting wedged when one
    # service is slow to come healthy on Coolify.
    depends_on:
      - bot

  # ===========================================================================
  # bot-mainnet — parallel instance running mainnet Polymarket execution.
  #
  # Sui side stays on TESTNET (Predict has no mainnet deployment yet) and runs
  # in PAPER mode by default — the Predict signals inform Polymarket trades
  # without minting on Sui. The Polymarket leg trades real money on Polygon
  # mainnet, gated by `MAINNET_POLY_EXECUTION_ENABLED` (defaults false).
  #
  # All env vars are MAINNET_-prefixed in the host shell / Coolify panel and
  # mapped to the standard names inside the container so the bot code is
  # unchanged. Separate volume keeps the SQLite ledger isolated from the
  # testnet bot.
  #
  # Required Coolify secrets (only when MAINNET_POLY_EXECUTION_ENABLED=true):
  #   MAINNET_POLY_PRIVATE_KEY
  #   MAINNET_POLY_API_KEY
  #   MAINNET_POLY_API_SECRET
  #   MAINNET_POLY_API_PASSPHRASE
  # Additional Coolify secret for HL hedging (only when MAINNET_HL_EXECUTION_ENABLED=true):
  #   MAINNET_HL_PRIVATE_KEY     — viem-format EVM private key for the HL operator
  # ===========================================================================
  bot-mainnet:
    # No build section on purpose — runs the image the `bot` service builds
    # (see note there). Runtime env is what differentiates the two bots.
    image: "svx-bot-${COOLIFY_RESOURCE_UUID:-local}:latest"
    depends_on:
      - bot
    restart: unless-stopped
    environment:
      SERVICE_FQDN_BOT_MAINNET_4321: ""
      NODE_ENV: production
      # Sui stays on testnet — Predict has no mainnet yet. Paper-trading by
      # default means signals don't mint on Sui; only Polymarket fires.
      SUI_NETWORK: testnet
      SUI_RPC_URL: "${MAINNET_SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}"
      PREDICT_SERVER_URL: "${MAINNET_PREDICT_SERVER_URL:-https://predict-server.testnet.mystenlabs.com}"
      # Execution kill-switches.
      PAPER_TRADING: "${MAINNET_PAPER_TRADING:-true}"
      POLY_EXECUTION_ENABLED: "${MAINNET_POLY_EXECUTION_ENABLED:-false}"
      HL_EXECUTION_ENABLED: "${MAINNET_HL_EXECUTION_ENABLED:-false}"
      VOL_ARB_ENABLED: "${MAINNET_VOL_ARB_ENABLED:-false}"
      # Network choices (per-deployment).
      POLY_NETWORK: "${MAINNET_POLY_NETWORK:-polygon}"
      POLY_RPC_URL: "${MAINNET_POLY_RPC_URL:-}"
      POLY_CLOB_HOST: "${MAINNET_POLY_CLOB_HOST:-}"
      POLY_SIGNATURE_TYPE: "${MAINNET_POLY_SIGNATURE_TYPE:-EOA}"
      POLY_FUNDER_ADDRESS: "${MAINNET_POLY_FUNDER_ADDRESS:-}"
      HL_NETWORK: "${MAINNET_HL_NETWORK:-mainnet}"
      # Infra identity.
      SVX_LOG_LEVEL: "${MAINNET_SVX_LOG_LEVEL:-info}"
      SVX_INSTANCE_LABEL: "${MAINNET_SVX_INSTANCE_LABEL:-mainnet}"
      # Secrets — set in Coolify panel.
      SUI_PRIVATE_KEY_BECH32: "${MAINNET_SUI_PRIVATE_KEY_BECH32:-}"
      OPERATOR_JSON: "${MAINNET_OPERATOR_JSON:-}"
      POLY_PRIVATE_KEY: "${MAINNET_POLY_PRIVATE_KEY:-}"
      POLY_API_KEY: "${MAINNET_POLY_API_KEY:-}"
      POLY_API_SECRET: "${MAINNET_POLY_API_SECRET:-}"
      POLY_API_PASSPHRASE: "${MAINNET_POLY_API_PASSPHRASE:-}"
      HL_PRIVATE_KEY: "${MAINNET_HL_PRIVATE_KEY:-}"
    volumes:
      - svx-data-mainnet:/data
    expose:
      - "4321"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # NOTE: dashboard-mainnet was removed — the single `dashboard` service now
  # serves both the testnet Predict view (under /) and the mainnet Polymarket
  # view (under /mainnet) by polling both bots. The mainnet bot URL is baked
  # into the client bundle at build time via NEXT_PUBLIC_SVX_API_MAINNET above.

volumes:
  svx-data:
  svx-data-mainnet:
