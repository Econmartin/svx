# Netlify config for hosting the SVX dashboard.
#
# IMPORTANT: this file MUST live at the repo root. Netlify only reads
# netlify.toml from the root, never from a subdirectory.
#
# Setup:
#   1. Push to GitHub.
#   2. Netlify → Add new site → Import from Git → pick this repo.
#   3. Netlify reads this file. No UI overrides needed.
#   4. In Site settings → Environment variables, set:
#        NEXT_PUBLIC_SVX_API         = https://svx-testnet.econmartin.xyz
#        NEXT_PUBLIC_SVX_API_MAINNET = https://svx-mainnet.econmartin.xyz
#   5. Trigger deploy with "Clear cache and deploy site".
#
# History note: an earlier version of this file shipped two `[[redirects]]`
# blocks that proxied /api/testnet/* and /api/mainnet/* to the bots' plain
# HTTP sslip.io addresses (Netlify-edge HTTPS termination → server-side
# fetch over HTTP → re-serve to the browser as HTTPS). That bridge was
# only needed because the bots were HTTP-only. Once the bots got real
# Let's Encrypt TLS via Coolify + Cloudflare DNS, the rewrites became
# dead weight and were removed — the dashboard now calls the HTTPS bot
# URLs directly from the browser.

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter svx-dashboard build"
  publish = "packages/svx-dashboard/.next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_FLAGS = "--shamefully-hoist"

[[plugins]]
  package = "@netlify/plugin-nextjs"
