# Netlify config for hosting the SVX dashboard.
#
# Why this exists: dashboard runs on HTTPS but the bot APIs live on
# plain HTTP at sslip.io URLs. Browsers block mixed-content fetches
# from HTTPS to HTTP. Netlify rewrites bridge the gap — the browser
# hits Netlify (HTTPS), Netlify fetches the HTTP backend server-side,
# and re-serves the response over HTTPS.
#
# IMPORTANT: this file MUST live at the repo root. Netlify only reads
# netlify.toml from the root, never from a subdirectory.
#
# IMPORTANT: Netlify DOES NOT expand environment variables in the
# `to` URL of redirect rules. The backend hostnames below are
# therefore HARDCODED. If your Coolify URLs change, edit them here
# and redeploy. (Netlify env vars still work for client-side
# NEXT_PUBLIC_* values that are baked into the JS bundle at build
# time — see the build command output for those.)
#
# Setup:
#   1. Push to GitHub.
#   2. Netlify → Add new site → Import from Git → pick this repo.
#   3. Netlify reads this file. No UI overrides needed.
#   4. In Site settings → Environment variables, set:
#        NEXT_PUBLIC_SVX_API = /api/testnet
#        NEXT_PUBLIC_SVX_API_MAINNET = /api/mainnet
#   5. Trigger deploy with "Clear cache and deploy site".

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter svx-dashboard build"
  publish = "packages/svx-dashboard/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_FLAGS = "--shamefully-hoist"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Proxy rules — server-side at Netlify's edge so the browser only
# talks HTTPS to Netlify, never directly to the HTTP backend.
# :splat captures everything after /api/<bot>/.
#
# Hardcoded backend URLs (env-var substitution isn't supported here).
[[redirects]]
  from = "/api/testnet/*"
  to = "http://nlu6qz87u63bu5w8x0shj99z.65.21.62.22.sslip.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/mainnet/*"
  to = "http://nlu6qz87u63bu5w8x0shj99z.65.21.62.22.sslip.io/:splat"
  status = 200
  force = true
