<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="svxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1eff8a" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#1eff8a" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="svxGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="2" y="2" width="28" height="28" rx="6.5"
        fill="url(#svxBg)"
        stroke="#1eff8a" stroke-opacity="0.42" stroke-width="1.25"/>
  <!-- S as a path so it renders the same in every browser regardless of
       installed fonts. Two arc segments — top half and bottom half — joined
       like a flattened "S". Stroke-based for crispness at 16px favicon size. -->
  <path
    d="M 21 9.5
       a 4 3.5 0 1 0 -8 0
       a 4 3.5 0 0 1 -1 6.5
       l 11 0
       a 4 3.5 0 0 1 -1 6.5
       a 4 3.5 0 1 0 -8 0"
    fill="none"
    stroke="#1eff8a"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#svxGlow)"
    opacity="0.95"
  />
</svg>
