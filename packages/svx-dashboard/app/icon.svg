<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="svxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1eff8a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1eff8a" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
  <!-- Rounded card matching the header logomark -->
  <rect x="2" y="2" width="28" height="28" rx="6.5"
        fill="url(#svxBg)"
        stroke="#1eff8a"
        stroke-opacity="0.45"
        stroke-width="1.25"/>
  <!-- Letter S — system mono stack so the user agent picks whatever
       monospace it has. Slight glow via the soft shadow. -->
  <text x="16" y="22.5"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="20"
        font-weight="800"
        fill="#1eff8a"
        style="paint-order: stroke; stroke: #1eff8a; stroke-opacity: 0.35; stroke-width: 0.5;">S</text>
</svg>
